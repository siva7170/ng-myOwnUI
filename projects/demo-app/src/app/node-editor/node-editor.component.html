<node-editor [nodes]="nodes" [containerHeight]="520">

  <!-- Input nodes: table selector -->
  <ng-template nodeTemplate="input:table" let-label="label" let-uv="upstreamValues">
    <div class="node-inside">
      <span class="node-sub-label">{{ label }}</span>
    </div>
  </ng-template>

  <!-- Process: filter -->
  <ng-template nodeTemplate="process:filter" let-uv="upstreamValues">
    <div class="node-inside">
      <div class="uv-title">Upstream values</div>
      <div class="uv-row" *ngFor="let entry of asEntries(uv)">
        <span class="uv-key">{{ entry[0] }}</span>
        <span class="uv-val">{{ entry[1] }}</span>
      </div>
      <div class="uv-empty" *ngIf="!hasEntries(uv)">No connections yet</div>
    </div>
  </ng-template>

  <!-- Output: final result — shows full resolved chain -->
  <ng-template nodeTemplate="output:final" let-uv="upstreamValues">
    <div class="node-inside">
      <div class="uv-title">All resolved values</div>
      <div class="uv-row" *ngFor="let entry of asEntries(uv)">
        <span class="uv-key">{{ entry[0] }}</span>
        <span class="uv-val">{{ entry[1] }}</span>
      </div>
      <div class="uv-empty" *ngIf="!hasEntries(uv)">No connections yet</div>
    </div>
  </ng-template>

</node-editor>
